<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocMind - Enterprise RAG Knowledge Base</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .container { text-align: center; max-width: 600px; padding: 2rem; }
    h1 { font-size: 3rem; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
    p { color: #94a3b8; font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    a { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600; transition: all 0.2s; }
    .primary { background: #3b82f6; color: white; }
    .primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.3); }
    .secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .secondary:hover { background: #334155; transform: translateY(-2px); }
    .stats { display: flex; gap: 2rem; justify-content: center; margin: 2rem 0; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #3b82f6; }
    .stat-label { font-size: 0.8rem; color: #64748b; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>DocMind</h1>
    <p>Enterprise RAG Knowledge Base System<br>Full-stack AI knowledge base with RAG, document management, hybrid search, and autonomous Agent.</p>
    <div class="stats">
      <div class="stat"><div class="stat-value">216</div><div class="stat-label">Backend Tests</div></div>
      <div class="stat"><div class="stat-value">95</div><div class="stat-label">Frontend Tests</div></div>
      <div class="stat"><div class="stat-value">11</div><div class="stat-label">Built-in Tools</div></div>
      <div class="stat"><div class="stat-value">8</div><div class="stat-label">Prompt Templates</div></div>
    </div>
    <div class="links">
      <a href="architecture.html" class="primary">View Architecture</a>
      <a href="https://github.com/sijie-Z/DocMind-RAG" class="secondary">GitHub Repo</a>
    </div>
  </div>
</body>
</html>
